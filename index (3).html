<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 🌙</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: radial-gradient(circle at center, #1C39BB 0%, #003153 60%, #001a33 100%);
            color: white;
            overflow: hidden; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Starry Night Animation */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            z-index: -1;
            animation: starsMove 80s linear infinite;
            opacity: 0.4;
        }

        @keyframes starsMove {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }

        /* MOSQUE SILHOUETTE */
        .mosque {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 150px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 150" fill="%23000d1a"><path d="M0 150h1000V90s-30-20-60-20-60 20-60 20V50c0-10-10-20-20-20s-20 10-20 20v40s-20-10-40-10-40 10-40 10V30c0-15-15-25-30-25s-30 10-30 25v65s-30-15-60-15-60 15-60 15V40c0-10-10-20-20-20s-20 10-20 20v60s-30-20-60-20-60 20-60 20v-50c0-15-15-25-30-25s-30 10-30 25v65s-30-15-60-15-60 15-60 15V50c0-10-10-20-20-20s-20 10-20 20v40s-20-10-40-10-40 10-40 10V30c0-15-15-25-30-25s-30 10-30 25v65S30 80 0 80v70z"/></svg>');
            background-repeat: repeat-x;
            background-size: contain;
            z-index: 0;
            opacity: 0.8;
        }

        /* GLOWING LANTERNS */
        .lantern-container {
            position: fixed;
            top: -20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 1;
        }

        .lantern {
            width: 60px;
            height: 100px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 80"><path d="M25 0v10M15 10h20l5 15-10 30h-20l-10-30z" fill="none" stroke="gold" stroke-width="2"/><circle cx="25" cy="35" r="8" fill="gold" opacity="0.8"/></svg>') no-repeat;
            animation: sway 4s ease-in-out infinite alternate;
            transform-origin: top center;
            filter: drop-shadow(0 0 15px gold);
        }

        .lantern:nth-child(2) { animation-delay: -1s; width: 45px; opacity: 0.7; }
        .lantern:nth-child(3) { animation-delay: -2.5s; }

        @keyframes sway {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }

        .container {
            padding: 20px;
            z-index: 2;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 85%;
            position: relative;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 40px;
            margin: 10px 0;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00ffff, 0 0 20px #1c39bb; }
            to { text-shadow: 0 0 20px #ffffff, 0 0 30px #1c39bb; }
        }

        p { font-size: 18px; margin: 15px 0; line-height: 1.6; }

        /* Updated Photo Styling with Animation */
        .saud-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            margin: 20px auto;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            display: block;
            /* Applies the reveal animation */
            animation: photoAppear 1.2s ease-out 0.3s forwards;
            opacity: 0; /* Start hidden */
        }

        /* Photo Animation Keyframes */
        @keyframes photoAppear {
            from {
                opacity: 0;
                transform: scale(0.5) rotate(-45deg) translateY(50px);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg) translateY(0);
            }
        }

        input {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 25px;
            border: none;
            margin-top: 15px;
            text-align: center;
            width: 80%;
            background: rgba(255, 255, 255, 0.95);
            color: #003153;
            outline: none;
        }

        button {
            padding: 12px 20px;
            font-size: 14px;
            margin: 8px 4px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #003153;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5); }

        footer { margin-top: 30px; font-size: 13px; opacity: 0.6; }

        @media(max-width:600px){
            h1{ font-size: 30px; }
            .card { padding: 30px 15px; }
            .mosque { height: 100px; }
        }
    </style>
</head>

<body>

    <div class="lantern-container">
        <div class="lantern"></div>
        <div class="lantern"></div>
        <div class="lantern"></div>
        <div class="lantern"></div>
    </div>

    <div class="container">
        <div class="card" id="mainCard">
            <div id="cardContent">
                <div style="font-size:60px; margin-bottom: 10px;">🌙</div>
                <h1>Eid Mubarak</h1>
                <p id="message">May Allah bless you with happiness, <br> prosperity, and peace.</p>
                <input type="text" id="name" placeholder="Enter your name">
                <div class="btn-group">
                    <button onclick="generateWish()">Create My Wish 🎉</button>
                    <button onclick="shareWhatsApp()">Share Website 📲</button>
                    <button id="musicBtn" onclick="toggleNasheed()">Play Nasheed 🎵</button>
                </div>
            </div>
            <footer>MADE WITH ❤️ BY SAUD</footer>
        </div>
    </div>

    <div class="mosque"></div>

    <div id="player"></div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'IEIQKfMM4IM', 
                playerVars: { 'autoplay': 0, 'controls': 0 }
            });
        }

        function toggleNasheed() {
            const btn = document.getElementById("musicBtn");
            if (!isPlaying) {
                player.playVideo();
                btn.innerHTML = "Pause Nasheed ⏸️";
                isPlaying = true;
            } else {
                player.pauseVideo();
                btn.innerHTML = "Play Nasheed 🎵";
                isPlaying = false;
            }
        }

        function generateWish(){
            let name = document.getElementById("name").value;
            if(name === ""){
                alert("Please enter your name 😊");
                return;
            }

            const cardContent = document.getElementById("cardContent");
            cardContent.innerHTML = `
                <h1>Eid Mubarak</h1>
                <p style="font-size: 22px; font-weight: bold; color: #FFD700; margin: 10px 0;">May Allah bless you with mercy</p>
                <p style="font-size: 18px; margin-bottom: 20px;">From <b>Saud</b> to <b>${name}</b></p>
                
                <img src="Screenshot_20260306_174459_Gallery.jpg" class="saud-photo" alt="Saud">
                
                <button onclick="location.reload()" style="margin-top: 20px; background: white; color: #003153;">Create Another 🔄</button>
                <button onclick="shareWhatsApp('${name}')">Share Wish 📲</button>
            `;
            
            confetti({
                particleCount: 200,
                spread: 90,
                origin: { y: 0.6 },
                colors: ['#1C39BB', '#FFD700', '#FFFFFF']
            });
        }

        function shareWhatsApp(receiverName = ""){
            let currentUrl = window.location.href;
            let shareText = receiverName 
                ? `🌙 Eid Mubarak! Saud sent you a special wish: ${currentUrl}`
                : `🌙 Wishing you a very Happy Eid! View my greeting here: ${currentUrl}`;
            
            let whatsappUrl = "https://wa.me/?text=" + encodeURIComponent(shareText);
            window.open(whatsappUrl, "_blank");
        }
    </script>
</body>
</html>
